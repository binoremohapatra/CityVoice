name: civicconnect
description: A new Flutter project for civic engagement.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- CORE & UTILITY ---
  sizer: ^2.0.15
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # --- UI & UX ---
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  flutter_slidable: ^3.1.0
  fluttertoast: ^8.2.14 # Fixed to a specific, compatible version

  # --- NETWORKING & CONNECTIVITY ---
  connectivity_plus: ^6.0.3
  dio: ^5.5.0+1

  # --- FEATURES ---
  # Replaced Google Maps with Flutter Map
  flutter_map: ^6.2.0
  latlong2: ^0.9.1
  geolocator: ^13.0.4

  # Media (Camera, Photos, Audio)
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  record: ^6.0.0
  audio_waveforms: ^1.0.5 # Fixed to a specific, compatible version
  file_picker: ^8.0.6

  # Permissions
  permission_handler: ^11.3.1

  # Web-specific for data export
  universal_html: ^2.2.4
  # Analytics & Charts
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logoapp.png
